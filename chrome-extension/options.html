<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Human Pages Posting Queue — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 32px; max-width: 480px; color: #1a1a1a; }
    h1 { font-size: 18px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .help { font-size: 12px; color: #6b7280; margin-top: -12px; margin-bottom: 16px; }
    .btn-row { display: flex; gap: 8px; align-items: center; }
    button { padding: 8px 20px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #testBtn { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    #testBtn:hover { background: #e5e7eb; }
    .saved { color: #059669; font-size: 13px; display: none; }
    .saved.show { display: inline; }
    #testResult { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
    #testResult.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    #testResult.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    #testResult.loading { display: block; background: #f0f9ff; color: #1e40af; border: 1px solid #bfdbfe; }
  </style>
</head>
<body>
  <h1>Extension Settings</h1>

  <label for="apiUrl">API Base URL</label>
  <input type="url" id="apiUrl" placeholder="https://humanpages.ai">
  <p class="help">The base URL of your Human Pages instance.</p>

  <label for="apiKey">Staff API Key</label>
  <input type="password" id="apiKey" placeholder="hp_...">
  <p class="help">Your personal API key. Get it from your admin.</p>

  <div class="btn-row">
    <button id="save">Save</button>
    <button id="testBtn">Test Connection</button>
    <span class="saved" id="savedMsg">Saved!</span>
  </div>

  <div id="testResult"></div>

  <script src="options.js"></script>
</body>
</html>
