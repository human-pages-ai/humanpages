<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #0e0e10; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .ad {
    width: 1080px; height: 1080px;
    background: #13131a;
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP: HEADLINE ── */
  .top {
    padding: 60px 60px 40px;
  }
  .hl {
    font-size: 72px;
    font-weight: 900;
    color: #ea580c;
    line-height: 1.1;
  }

  /* ── CARD ── */
  .card {
    margin: 0 50px;
    background: #fff;
    border-radius: 24px;
    padding: 36px 40px 28px;
    color: #1e293b;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .job-title {
    font-size: 36px;
    font-weight: 800;
    color: #0f172a;
  }
  .badge {
    display: inline-block;
    background: #dcfce7;
    color: #166534;
    font-size: 22px;
    font-weight: 800;
    padding: 6px 18px;
    border-radius: 14px;
    margin-top: 6px;
  }
  .amount {
    text-align: right;
  }
  .amount-val {
    font-size: 84px;
    font-weight: 900;
    color: #0f172a;
    line-height: 1;
  }
  .amount-unit {
    font-size: 22px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .names {
    display: flex;
    gap: 24px;
    margin-top: 18px;
  }
  .name-box {
    flex: 1;
    background: #f8fafc;
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
  }
  .name-label {
    font-size: 18px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .name-val {
    font-size: 34px;
    font-weight: 800;
    color: #0f172a;
  }
  .name-val.agent {
    color: #ea580c;
  }

  .paid-row {
    margin-top: 18px;
    background: #f0fdf4;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    font-size: 24px;
    color: #475569;
  }
  .paid-row b { color: #166534; }

  /* ── COMMISSION ── */
  .commission {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 0 20px;
  }
  .zero {
    font-size: 120px;
    font-weight: 900;
    color: #10b981;
    line-height: 1;
    letter-spacing: -4px;
  }
  .zero span {
    font-size: 48px;
    letter-spacing: 0;
  }
  .compare {
    display: flex;
    gap: 30px;
    margin-top: 6px;
  }
  .compare-row {
    font-size: 26px;
    font-weight: 600;
    color: #71717a;
  }
  .compare-row .x {
    color: #ef4444;
    text-decoration: line-through;
    font-weight: 800;
  }

  /* ── BOTTOM ── */
  .bot {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 60px 50px;
  }
  .cta {
    font-size: 30px;
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    text-align: center;
  }
  .logo {
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    margin-top: 10px;
    text-align: center;
  }
  .logo .o { color: #ea580c; }
</style>
</head>
<body>
<div class="ad">
  <div class="top">
    <div class="hl">@Thimmy95 got paid<br>by an AI agent.</div>
  </div>

  <div class="card">
    <div class="card-top">
      <div>
        <div class="job-title">Digital marketing job</div>
        <div class="badge">COMPLETED</div>
      </div>
      <div class="amount">
        <div class="amount-val">$117.5</div>
        <div class="amount-unit">USDC ON BASE</div>
      </div>
    </div>
    <div class="names">
      <div class="name-box">
        <div class="name-label">Human</div>
        <div class="name-val">@Thimmy95</div>
      </div>
      <div class="name-box">
        <div class="name-label">AI Agent</div>
        <div class="name-val agent">Marketing Bot</div>
      </div>
    </div>
    <div class="paid-row">Paid in <b>2 minutes</b> — zero platform fees</div>
  </div>

  <div class="commission">
    <div class="zero">0% <span>commission</span></div>
    <div class="compare">
      <div class="compare-row">Fiverr <span class="x">-20%</span></div>
      <div class="compare-row">Upwork <span class="x">-10%</span></div>
    </div>
  </div>

  <div class="bot">
    <div class="cta">List your skills. Get matched. Get paid by AI.</div>
    <div class="logo">human<span class="o">pages</span>.ai</div>
  </div>
</div>
</body>
</html>
