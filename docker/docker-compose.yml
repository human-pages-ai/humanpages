version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: humans_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-humans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-humans_secret}
      POSTGRES_DB: ${POSTGRES_DB:-humans_marketplace}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
