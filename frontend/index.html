<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The future of hiring networks. No commissions, no middlemen." />
    <meta name="theme-color" content="#1e293b" />

    <!-- Open Graph -->
    <meta property="og:title" content="Human Pages — AI's Hiring. Are You Listed?" />
    <meta property="og:description" content="The future of hiring networks. No commissions, no middlemen." />
    <meta property="og:image" content="https://humanpages.ai/api/og/default" />
    <meta property="og:url" content="https://humanpages.ai/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Human Pages" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Human Pages — AI's Hiring. Are You Listed?" />
    <meta name="twitter:description" content="The future of hiring networks. No commissions, no middlemen." />
    <meta name="twitter:image" content="https://humanpages.ai/api/og/default" />

    <link rel="canonical" href="https://humanpages.ai/" />

    <title>Human Pages — AI's Hiring. Are You Listed?</title>

    <!-- WebSite structured data for search engines and AI agents -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HumanPages.ai",
      "url": "https://humanpages.ai",
      "description": "The directory AI agents use to hire humans for real-world tasks. Zero platform fees.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://humanpages.ai/api/humans/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- OG_META_PLACEHOLDER -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
