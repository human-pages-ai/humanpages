<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1e293b"/>

  <!-- Circuit traces (machine side) -->
  <line x1="12" y1="30" x2="30" y2="30" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="18" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
  <circle cx="30" cy="18" r="2" fill="#2563eb" opacity="0.4"/>
  <line x1="12" y1="50" x2="22" y2="50" stroke="#2563eb" stroke-width="1.5" opacity="0.25"/>
  <line x1="12" y1="70" x2="28" y2="70" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <line x1="28" y1="70" x2="28" y2="82" stroke="#2563eb" stroke-width="1.5" opacity="0.2"/>
  <circle cx="28" cy="82" r="2" fill="#2563eb" opacity="0.3"/>

  <!-- The "h" letterform — left stroke is angular/digital, right stroke curves into organic -->
  <path d="M 34 25 L 34 72" stroke="#2563eb" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M 34 48 L 42 48 Q 54 48 54 58 L 54 72" stroke="#2563eb" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Organic lines (human side) -->
  <path d="M 68 24 Q 78 30 82 42" stroke="#60a5fa" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 72 60 Q 80 65 85 78" stroke="#60a5fa" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 62 76 Q 70 82 80 84" stroke="#60a5fa" stroke-width="1.5" opacity="0.2" fill="none"/>
  <circle cx="82" cy="42" r="2" fill="#60a5fa" opacity="0.35"/>
  <circle cx="85" cy="78" r="2" fill="#60a5fa" opacity="0.3"/>

  <!-- Small connecting dot where machine meets human -->
  <circle cx="54" cy="48" r="3" fill="#60a5fa" opacity="0.6"/>
</svg>
