  <path d="M 426 206 L 426 262" stroke="#e2e8f0" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 426 234 C 426 234 435 225 445 225 C 455 225 459 233 459 239 L 459 262" stroke="#e2e8f0" stroke-width="13" stroke-linecap="round" fill="none"/>
  <circle cx="477" cy="268" r="14" fill="#1e293b"/>
  <circle cx="477" cy="268" r="11" fill="#2563eb"/>
  <path d="M 471 268 L 475 272 L 484 263" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: human (white) + pages (blue) + .ai (gray) -->
  <text x="510" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#e2e8f0">human</tspan><tspan fill="#2563eb">pages</tspan><tspan fill="#64748b">.ai</tspan>
  </text>

