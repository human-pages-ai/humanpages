<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep navy background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <defs>
    <!-- Subtle radial glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient accent bar -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo -->
  <text x="600" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" text-anchor="middle">
    <tspan fill="#f1f5f9">human</tspan><tspan fill="#3b82f6">pages</tspan><tspan fill="#f97316" font-weight="500">.ai</tspan>
  </text>

  <!-- Hook — bold white -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#f1f5f9" text-anchor="middle">Stop chasing clients.</text>

  <!-- Benefit — lighter blue -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#60a5fa" text-anchor="middle">List your skills and let AI bring them to you.</text>
</svg>